version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sigongcore-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sigongcore
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sigongcore-backend
    volumes:
      - ./backend:/app
      - ./종합적산정보건축부문(견적서근거자료).pdf:/app/data/estimate_arch.pdf
      - ./종합적산정보공통부문(견적서근거자료).pdf:/app/data/estimate_common.pdf
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/sigongcore
    depends_on:
      db:
        condition: service_healthy

  frontend-admin:
    build:
      context: ./frontend
      target: admin
    container_name: sigongcore-admin
    ports:
      - "3133:3033"
    env_file: ./frontend/.env
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
